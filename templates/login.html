<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">

<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Signin</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="{{ url_for('static', filename='css/sign.css') }}" rel="stylesheet">

</head>

<body class="d-flex align-items-center py-4 bg-body-tertiary">

        <main class="form-signin w-100 m-auto">

                <form action="/dashboard" method="POST">
                        {% set fname = 'assets/img/' + params['login_img'] %}
                        <img class="mb-4" src="{{ url_for('static', filename=fname) }}" width="72" height="57">

                        <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

                        <div class="form-floating">
                                <input type="email" class="form-control" id="uname" name="uname"
                                        placeholder="name@example.com">
                                <label for="uname">Email address</label>
                        </div>

                        <div class="form-floating">
                                <input type="password" class="form-control" id="pass" name="pass"
                                        placeholder="Password">
                                <label for="pass">Password</label>
                        </div>

                        <div class="form-check text-start my-3">
                                <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
                                <label class="form-check-label" for="checkDefault">
                                        Remember me
                                </label>
                        </div>

                        <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} mt-2">
                                {{ message }}
                        </div>
                        {% endfor %}
                        {% endif %}
                        {% endwith %}
                        <p class="mt-5 mb-3 text-body-secondary">{{params['blog_name']}} &copy; 2017–2025</p>

                </form>

        </main>

</body>

</html>
